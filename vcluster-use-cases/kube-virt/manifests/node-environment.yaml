apiVersion: storage.loft.sh/v1
kind: NodeEnvironment
metadata:
  name: bare-metal
  namespace: p-default
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  providerRef: metal3
  owner:
    user: admin
  properties:
    metal3.vcluster.com/network-cidr: 192.168.100.1/24
    metal3.vcluster.com/network-ip-range: 192.168.100.100-192.168.100.120
    metal3.vcluster.com/dns-servers: "1.1.1.1"
