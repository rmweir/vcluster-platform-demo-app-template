apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bare-metal-1-virtbmc
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    kubevirt.io/virtualmachinebmc-name: bare-metal-1
    kubevirt.io/vm-name: bare-metal-1
spec:
  serviceName: bare-metal-1-virtbmc
  replicas: 1
  selector:
    matchLabels:
      kubevirt.io/virtualmachinebmc-name: bare-metal-1
  template:
    metadata:
      labels:
        kubevirt.io/virtualmachinebmc-name: bare-metal-1
        kubevirt.io/vm-name: bare-metal-1
    spec:
      serviceAccountName: bare-metal-1-virtbmc
      containers:
        - name: virtbmc
          image: ghcr.io/loft-sh/kubevirtbmc/virtbmc:v0.7.0-vcluster
          args:
            - --address
            - 0.0.0.0
            - --ipmi-port
            - "10623"
            - --redfish-port
            - "10080"
            - default
            - bare-metal-1
          env:
            - name: BMC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: bare-metal-1-bmc
                  key: username
            - name: BMC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bare-metal-1-bmc
                  key: password
          ports:
            - containerPort: 10623
              name: ipmi
              protocol: UDP
            - containerPort: 10080
              name: redfish
        - name: caddy
          image: caddy:2
          command:
            - sh
            - -c
            - |
              cat <<EOF > /tmp/Caddyfile
              bare-metal-1-virtbmc.default.svc.cluster.local:443 {
                  tls internal
                  reverse_proxy localhost:10080
              }
              EOF
              caddy run --config /tmp/Caddyfile
          ports:
            - containerPort: 443
              name: https
---
