  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "br0-bare-metal-1",
      "type": "bridge",
      "bridge": "br0",
