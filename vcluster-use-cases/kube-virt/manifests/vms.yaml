apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: bare-metal-1
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  runStrategy: Halted
  dataVolumeTemplates:
    - metadata:
        name: bare-metal-1-disk
      spec:
        pvc:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 100Gi
        source:
          blank: {}
  template:
    spec:
      domain:
        cpu:
          cores: 2
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
          interfaces:
            - name: default
              macAddress: "02:00:00:00:00:01"
              bridge: {}
              bootOrder: 1
        resources:
          requests:
            memory: 4Gi
            cpu: "2000m"
        firmware:
          bootloader:
            efi:
              secureBoot: false
      networks:
        - name: default
          multus:
            networkName: br0-bare-metal-1
      volumes:
        - name: rootdisk
          dataVolume:
            name: bare-metal-1-disk
---
