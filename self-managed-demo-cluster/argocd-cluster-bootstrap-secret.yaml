apiVersion: v1
kind: Secret
metadata:
  name: cluster-local
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    eso: 'true'
    flux: 'true'
    kyverno: 'true'
    loftDemoDomain: {REPLACE_VCLUSTER_NAME}.{REPLACE_BASE_DOMAIN}
    cnpg: 'true'
    continuousPromotion: 'false'
    customResourceSync: ''
    databaseConnector: 'true'
    rancher: 'false'
    resolveDNS: ''
    virtualScheduler: ''
    vnode: 'true'
    kubeVirt: ''
type: Opaque
stringData:
  config: {"tlsClientConfig":{"insecure":false}}
  name: in-cluster
  server: https://kubernetes.default.svc
